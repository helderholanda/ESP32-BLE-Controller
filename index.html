<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#1976d2">

<link rel="manifest" href="manifest.json">

<title>ESP32 BLE Controller</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#121212;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.container{

width:360px;
background:#1f1f1f;
padding:25px;
border-radius:18px;
box-shadow:0 0 20px rgba(0,0,0,.4);

}

h1{

text-align:center;
margin-bottom:20px;
font-size:28px;

}

.status{

margin:15px 0;
padding:10px;
background:#2d2d2d;
border-radius:10px;
text-align:center;
font-size:17px;

}

button{

width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#1976d2;
color:white;
font-size:17px;
cursor:pointer;
transition:.2s;

}

button:hover{

background:#1565c0;

}

button:active{

transform:scale(.98);

}

button.red{

background:#d32f2f;

}

button.red:hover{

background:#b71c1c;

}

button.green{

background:#388e3c;

}

button.green:hover{

background:#2e7d32;

}

button.orange{

background:#ef6c00;

}

button.orange:hover{

background:#e65100;

}

#controlScreen{

display:none;

}

.info{

font-size:14px;
color:#bbbbbb;
margin-top:20px;
text-align:center;

}

footer{

margin-top:25px;
font-size:12px;
color:#777;
text-align:center;

}

.loader{

width:28px;
height:28px;
border:4px solid #666;
border-top:4px solid #2196f3;
border-radius:50%;
animation:spin 1s linear infinite;
margin:20px auto;
display:none;

}

@keyframes spin{

0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}

}

.connected{

color:#66ff99;

}

.disconnected{

color:#ff6666;

}

</style>

</head>

<body>

<div class="container">

<h1>ESP32 BLE</h1>

<div id="connectScreen">

<div id="status" class="status disconnected">

Desconectado

</div>

<div class="loader" id="loader"></div>

<button onclick="connectBLE()">

🔍 Procurar Dispositivo

</button>

<div class="info">

Selecione seu ESP32 na lista Bluetooth.

</div>

</div>

<div id="controlScreen">

<div id="deviceName" class="status connected">

Conectado

</div>

<button class="green"

onclick="sendCommand('FAST_BLINK')">

⚡ Piscar Rápido

</button>

<button class="orange"

onclick="sendCommand('MORSE_SOS')">

📡 Morse SOS

</button>

<button

onclick="sendCommand('LED_ON')">

💡 Ligar LED

</button>

<button

onclick="sendCommand('LED_OFF')">

🌙 Desligar LED

</button>

<button class="red"

onclick="disconnectBLE()">

Desconectar

</button>

</div>

<footer>

ESP32 BLE Controller v1.0

</footer>

</div>

<script>

if('serviceWorker' in navigator){

window.addEventListener('load',()=>{

navigator.serviceWorker.register('sw.js');

});

}

let device=null;
let server=null;
let service=null;
let characteristic=null;

const SERVICE_UUID="12345678-1234-1234-1234-1234567890ab";

const CHARACTERISTIC_UUID="abcd1234-5678-1234-5678-abcdef123456";

let reconnect=false;

async function connectBLE(){

document.getElementById("loader").style.display="block";

document.getElementById("status").innerHTML="Procurando dispositivo...";

try{

device=await navigator.bluetooth.requestDevice({

acceptAllDevices:true,

optionalServices:[SERVICE_UUID]

});

device.addEventListener(

'gattserverdisconnected',

onDisconnected

);

server=await device.gatt.connect();

service=await server.getPrimaryService(

SERVICE_UUID

);

characteristic=

await service.getCharacteristic(

CHARACTERISTIC_UUID

);

document.getElementById("loader").style.display="none";

document.getElementById("connectScreen").style.display="none";

document.getElementById("controlScreen").style.display="block";

document.getElementById("deviceName").innerHTML=

"Conectado a<br><b>"+device.name+"</b>";

reconnect=true;

}catch(e){

document.getElementById("loader").style.display="none";

document.getElementById("status").innerHTML="Desconectado";

alert(e);

}

async function sendCommand(command){

if(!characteristic){

alert("ESP32 não conectado.");

return;

}

try{

const encoder=new TextEncoder();

await characteristic.writeValue(

encoder.encode(command)

);

console.log("Enviado:",command);

showToast("Comando enviado: "+command);

}catch(e){

console.error(e);

alert("Erro ao enviar comando.");

}

}

function disconnectBLE(){

if(device){

if(device.gatt.connected){

device.gatt.disconnect();

}

}

}

function onDisconnected(){

document.getElementById("controlScreen").style.display="none";

document.getElementById("connectScreen").style.display="block";

document.getElementById("status").innerHTML="Desconectado";

document.getElementById("status").className="status disconnected";

device=null;
server=null;
service=null;
characteristic=null;

showToast("ESP32 desconectado.");

}

function showToast(text){

let toast=document.getElementById("toast");

if(!toast){

toast=document.createElement("div");

toast.id="toast";

toast.style.position="fixed";

toast.style.bottom="25px";

toast.style.left="50%";

toast.style.transform="translateX(-50%)";

toast.style.background="#333";

toast.style.color="white";

toast.style.padding="14px 22px";

toast.style.borderRadius="10px";

toast.style.boxShadow="0 0 15px rgba(0,0,0,.3)";

toast.style.transition=".3s";

toast.style.opacity="0";

toast.style.zIndex="9999";

document.body.appendChild(toast);

}

toast.innerHTML=text;

toast.style.opacity="1";

setTimeout(()=>{

toast.style.opacity="0";

},2200);

}

async function reconnectDevice(){

if(!reconnect) return;

try{

server=await device.gatt.connect();

service=await server.getPrimaryService(

SERVICE_UUID

);

characteristic=

await service.getCharacteristic(

CHARACTERISTIC_UUID

);

document.getElementById("connectScreen").style.display="none";

document.getElementById("controlScreen").style.display="block";

document.getElementById("deviceName").innerHTML=

"Reconectado a<br><b>"+device.name+"</b>";

showToast("Reconectado!");

}catch(e){

console.log("Reconexão falhou.");

}

}

setInterval(()=>{

if(device){

if(!device.gatt.connected){

reconnectDevice();

}

}

},3000);

window.addEventListener("beforeunload",()=>{

if(device){

if(device.gatt.connected){

device.gatt.disconnect();

}

}

});
    /* ==========
   FUTURAS FUNÇÕES
   ========== */

// Aqui adicionaremos leitura de sensores,
// status do LED,
// controle de GPIO,
// bateria,
// OTA,
// etc.

console.log("ESP32 BLE Controller iniciado.");

</script>

</body>

</html>
